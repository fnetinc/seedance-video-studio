<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Seedance Video Studio</title>
<style>
  :root {
    --bg: #f6f7fb;
    --panel: #ffffff;
    --panel-2: #f1f3f9;
    --border: #dfe3ec;
    --text: #1a1f2c;
    --muted: #5b6478;
    --accent: #2563eb;
    --accent-2: #7c3aed;
    --ok: #047857;
    --err: #b91c1c;
    --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header { padding: 24px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 16px; }
  header h1 { margin: 0; font-size: 20px; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 13px; }
  main { max-width: 1200px; margin: 0 auto; padding: 28px 32px 80px; display: grid; grid-template-columns: 380px 1fr; gap: 28px; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); }
  .panel h2 { margin: 0 0 14px; font-size: 14px; font-weight: 600; letter-spacing: 0.04em; color: var(--muted); text-transform: uppercase; }
  label { display: block; font-size: 13px; margin: 12px 0 6px; color: var(--muted); }
  input[type=file], textarea, input[type=text] { width: 100%; background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; }
  textarea { resize: vertical; min-height: 110px; }
  .preview { margin-top: 10px; border: 1px dashed var(--border); border-radius: 8px; padding: 8px; min-height: 120px; display: flex; align-items: center; justify-content: center; background: var(--panel-2); }
  .preview img { max-width: 100%; max-height: 180px; border-radius: 6px; }
  .preview.empty { color: var(--muted); font-size: 13px; }

  button { cursor: pointer; border: 0; border-radius: 8px; padding: 10px 14px; font-size: 14px; font-weight: 600; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; width: 100%; padding: 12px; margin-top: 14px; }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }

  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; }
  .toolbar .grow { flex: 1; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow); }
  .card video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }
  .card .placeholder { width: 100%; aspect-ratio: 16/9; background: var(--panel-2); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; flex-direction: column; gap: 10px; padding: 16px; text-align: center; border-bottom: 1px solid var(--border); }
  .card .placeholder .label { font-weight: 600; color: var(--text); font-size: 14px; letter-spacing: 0.02em; }
  .card .placeholder .sub { font-size: 12px; color: var(--muted); }
  .card .placeholder .timer { font-variant-numeric: tabular-nums; font-size: 12px; color: var(--muted); }
  .progressbar { width: 80%; max-width: 240px; height: 6px; background: rgba(15,23,42,0.08); border-radius: 999px; overflow: hidden; position: relative; }
  .progressbar > .fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: 999px; transition: width 0.4s ease; }
  .progressbar.indeterminate > .fill { width: 35% !important; animation: slide 1.6s ease-in-out infinite; }
  @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(285%); } }
  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; margin-right: 6px; vertical-align: middle; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }
  .card .body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
  .card .prompt { font-size: 13px; color: var(--text); line-height: 1.4; max-height: 4.2em; overflow: hidden; }
  .card .meta { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
  .card .actions { display: flex; gap: 6px; }
  .card .actions button { flex: 1; padding: 7px 10px; font-size: 12px; }

  .status { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); background: var(--panel-2); }
  .status.PENDING, .status.RUNNING, .status.THROTTLED { color: var(--accent); border-color: rgba(37,99,235,0.35); background: rgba(37,99,235,0.08); }
  .status.SUCCEEDED { color: var(--ok); border-color: rgba(4,120,87,0.35); background: rgba(4,120,87,0.08); }
  .status.FAILED { color: var(--err); border-color: rgba(185,28,28,0.35); background: rgba(185,28,28,0.08); }

  .empty-state { color: var(--muted); padding: 60px 20px; text-align: center; border: 1px dashed var(--border); border-radius: 12px; }

  .spinner { width: 28px; height: 28px; border: 3px solid rgba(15,23,42,0.12); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .err-msg { color: var(--err); font-size: 12px; margin-top: 8px; }
  small.hint { color: var(--muted); font-size: 11px; }
</style>
</head>
<body>
<header>
  <h1>Seedance Video Studio</h1>
  <span class="sub">15s · 16:9 · with sound</span>
</header>
<main>
  <section class="panel">
    <h2>Generate</h2>
    <form id="genForm">
      <label for="image">Reference image</label>
      <input id="image" type="file" name="image" accept="image/*" required />
      <div id="preview" class="preview empty">No image selected</div>

      <label for="prompt">Prompt</label>
      <textarea id="prompt" name="prompt" placeholder="Describe the video you want…" required></textarea>
      <small class="hint">Reference the image with @IMG_1 in your prompt if you want to anchor it explicitly.</small>

      <button id="genBtn" class="btn-primary" type="submit">Generate Video</button>
      <div id="genErr" class="err-msg" hidden></div>
    </form>
  </section>

  <section>
    <div class="toolbar">
      <strong class="grow">Videos</strong>
      <button id="bulkBtn" class="btn-secondary" disabled>Download all (.zip)</button>
      <button id="clearBtn" class="btn-ghost">Clear</button>
    </div>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty-state">No videos yet. Upload a reference image and prompt to get started.</div>
  </section>
</main>

<script>
  const form = document.getElementById('genForm');
  const imageInput = document.getElementById('image');
  const promptInput = document.getElementById('prompt');
  const preview = document.getElementById('preview');
  const genBtn = document.getElementById('genBtn');
  const genErr = document.getElementById('genErr');
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const bulkBtn = document.getElementById('bulkBtn');
  const clearBtn = document.getElementById('clearBtn');

  const STORE_KEY = 'seedance.videos.v1';
  /** @type {Map<string, {taskId:string, prompt:string, status:string, videoUrl?:string, error?:string, createdAt:number}>} */
  const videos = new Map();

  function loadStore() {
    try {
      const raw = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
      for (const v of raw) videos.set(v.taskId, v);
    } catch {}
  }
  function saveStore() {
    localStorage.setItem(STORE_KEY, JSON.stringify([...videos.values()]));
  }

  imageInput.addEventListener('change', () => {
    const file = imageInput.files?.[0];
    if (!file) { preview.className = 'preview empty'; preview.textContent = 'No image selected'; return; }
    const url = URL.createObjectURL(file);
    preview.className = 'preview';
    preview.innerHTML = '';
    const img = document.createElement('img');
    img.src = url;
    preview.appendChild(img);
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    genErr.hidden = true;
    const file = imageInput.files?.[0];
    const prompt = promptInput.value.trim();
    if (!file || !prompt) return;

    genBtn.disabled = true;
    genBtn.textContent = 'Submitting…';
    try {
      const fd = new FormData();
      fd.append('image', file);
      fd.append('prompt', prompt);
      const res = await fetch('/api/generate', { method: 'POST', body: fd });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || 'Generation failed.');

      console.log('[generate] full response:', JSON.stringify(json, null, 2));
      videos.set(json.taskId, {
        taskId: json.taskId,
        prompt,
        status: json.status || 'PENDING',
        createdAt: Date.now(),
        _debugCreate: json._debug || null,
      });
      saveStore();
      render();
      pollTask(json.taskId);

      promptInput.value = '';
      imageInput.value = '';
      preview.className = 'preview empty';
      preview.textContent = 'No image selected';
    } catch (err) {
      genErr.textContent = err.message;
      genErr.hidden = false;
    } finally {
      genBtn.disabled = false;
      genBtn.textContent = 'Generate Video';
    }
  });

  function fmtElapsed(ms) {
    const s = Math.max(0, Math.floor(ms / 1000));
    const m = Math.floor(s / 60);
    const r = s % 60;
    return `${String(m).padStart(2,'0')}:${String(r).padStart(2,'0')}`;
  }
  function pollText(v) {
    const elapsed = `Elapsed ${fmtElapsed(Date.now() - v.createdAt)}`;
    const checks = v.pollCount ? ` · Checked ${v.pollCount}×` : '';
    const last = v.lastPollAt ? ` · Last check ${Math.max(0, Math.round((Date.now() - v.lastPollAt) / 1000))}s ago` : '';
    return `${elapsed}${checks}${last}`;
  }
  function statusLabel(status) {
    switch (status) {
      case 'PENDING': return 'Queued';
      case 'THROTTLED': return 'Waiting in queue';
      case 'RUNNING': return 'Generating video';
      case 'SUCCEEDED': return 'Ready';
      case 'FAILED': return 'Failed';
      default: return status || 'Working';
    }
  }
  function subText(v) {
    if (v.status === 'THROTTLED' && typeof v.estimatedTimeToStartSeconds === 'number') {
      return `Starts in ~${Math.max(1, Math.round(v.estimatedTimeToStartSeconds))}s · Seedance can take up to 5 min`;
    }
    if (typeof v.progressRatio === 'number' && v.progressRatio > 0) {
      return `${Math.round(v.progressRatio * 100)}%${v.progressText ? ' · ' + v.progressText : ''}`;
    }
    if (v.progressText) return v.progressText;
    return 'Seedance can take up to 5 min · keep this tab open';
  }

  setInterval(() => {
    document.querySelectorAll('.timer[data-created]').forEach(el => {
      const created = Number(el.dataset.created);
      if (!Number.isFinite(created)) return;
      const lastPoll = Number(el.dataset.lastPoll || 0);
      const pollCount = Number(el.dataset.pollCount || 0);
      el.textContent = pollText({ createdAt: created, lastPollAt: lastPoll || null, pollCount });
    });
  }, 1000);

  async function pollTask(taskId) {
    const v = videos.get(taskId);
    if (!v) return;
    if (v.status === 'SUCCEEDED' || v.status === 'FAILED') return;
    try {
      const res = await fetch(`/api/status?taskId=${encodeURIComponent(taskId)}`);
      const json = await res.json();
      v.lastPollAt = Date.now();
      v.pollCount = (v.pollCount || 0) + 1;
      if (res.ok) {
        console.log(`[poll] ${taskId.slice(-12)} → ${json.status} video=${json.videoUrl ? 'YES' : 'no'}`);
        v.status = json.status || v.status;
        v.progressRatio = json.progressRatio;
        v.progressText = json.progressText;
        v.estimatedTimeToStartSeconds = json.estimatedTimeToStartSeconds;
        v._raw = json._raw || null;
        if (json.videoUrl) v.videoUrl = `/api/download?taskId=${encodeURIComponent(taskId)}`;
        if (json.error) v.error = typeof json.error === 'string' ? json.error : JSON.stringify(json.error);
        v.pollError = null;
      } else {
        console.warn(`[poll] ERROR ${res.status}:`, json);
        v.pollError = json.error || `Status ${res.status}`;
      }
      saveStore();
      render();
    } catch (e) {
      console.warn('[poll] fetch error', e);
      v.lastPollAt = Date.now();
      v.pollCount = (v.pollCount || 0) + 1;
      v.pollError = e.message;
      saveStore();
      render();
    }
    if (v.status !== 'SUCCEEDED' && v.status !== 'FAILED') {
      setTimeout(() => pollTask(taskId), 30000);
    }
  }

  function render() {
    const list = [...videos.values()].sort((a, b) => b.createdAt - a.createdAt);
    grid.innerHTML = '';
    empty.style.display = list.length ? 'none' : 'block';

    let succeeded = 0;
    for (const v of list) {
      if (v.status === 'SUCCEEDED') succeeded++;
      const card = document.createElement('div');
      card.className = 'card';

      let media;
      if (v.status === 'SUCCEEDED') {
        media = document.createElement('video');
        media.controls = true;
        media.preload = 'metadata';
        media.src = `/api/download?taskId=${encodeURIComponent(v.taskId)}`;
        media.onerror = () => {
          const fallback = document.createElement('div');
          fallback.className = 'placeholder';
          const lbl = document.createElement('div'); lbl.className = 'label';
          lbl.textContent = 'Video URL not yet available';
          const sub = document.createElement('div'); sub.className = 'sub';
          sub.textContent = 'Server reports SUCCEEDED but the video file isn\'t reachable yet. Visit /api/debug/' + v.taskId + ' to inspect.';
          fallback.appendChild(lbl); fallback.appendChild(sub);
          media.replaceWith(fallback);
        };
      } else if (v.status === 'FAILED') {
        media = document.createElement('div');
        media.className = 'placeholder';
        media.textContent = v.error || 'Generation failed.';
      } else {
        media = document.createElement('div');
        media.className = 'placeholder';

        const label = document.createElement('div');
        label.className = 'label';
        const dot = document.createElement('span'); dot.className = 'pulse-dot';
        label.appendChild(dot);
        label.appendChild(document.createTextNode(statusLabel(v.status)));
        media.appendChild(label);

        const bar = document.createElement('div');
        bar.className = 'progressbar';
        const fill = document.createElement('div');
        fill.className = 'fill';
        if (typeof v.progressRatio === 'number' && v.progressRatio > 0) {
          fill.style.width = `${Math.max(3, Math.round(v.progressRatio * 100))}%`;
        } else {
          bar.classList.add('indeterminate');
        }
        bar.appendChild(fill);
        media.appendChild(bar);

        const sub = document.createElement('div');
        sub.className = 'sub';
        sub.textContent = v.pollError ? `Poll error: ${v.pollError}` : subText(v);
        if (v.pollError) sub.style.color = 'var(--err)';
        media.appendChild(sub);

        const timer = document.createElement('div');
        timer.className = 'timer';
        timer.dataset.created = String(v.createdAt);
        timer.dataset.lastPoll = String(v.lastPollAt || 0);
        timer.dataset.pollCount = String(v.pollCount || 0);
        timer.textContent = pollText(v);
        media.appendChild(timer);
      }
      card.appendChild(media);

      const body = document.createElement('div');
      body.className = 'body';

      const promptEl = document.createElement('div');
      promptEl.className = 'prompt';
      promptEl.textContent = v.prompt;
      body.appendChild(promptEl);

      const meta = document.createElement('div');
      meta.className = 'meta';
      const stat = document.createElement('span');
      stat.className = `status ${v.status}`;
      stat.textContent = v.status;
      meta.appendChild(stat);
      const id = document.createElement('span');
      id.textContent = v.taskId.slice(-10);
      meta.appendChild(id);
      body.appendChild(meta);

      const actions = document.createElement('div');
      actions.className = 'actions';
      const dl = document.createElement('button');
      dl.className = 'btn-secondary';
      dl.textContent = 'Download';
      dl.disabled = v.status !== 'SUCCEEDED';
      dl.onclick = () => {
        const a = document.createElement('a');
        a.href = `/api/download?taskId=${encodeURIComponent(v.taskId)}`;
        a.download = `seedance-video.mp4`;
        document.body.appendChild(a); a.click(); a.remove();
      };
      actions.appendChild(dl);

      const dbg = document.createElement('button');
      dbg.className = 'btn-ghost';
      dbg.textContent = 'Debug';
      dbg.onclick = () => {
        const data = { taskId: v.taskId, status: v.status, pollError: v.pollError || null, pollCount: v.pollCount, rawApiResponse: v._raw || null };
        const pre = document.createElement('pre');
        pre.style.cssText = 'max-height:300px;overflow:auto;background:#f1f3f9;padding:8px;border-radius:6px;font-size:11px;white-space:pre-wrap;word-break:break-all;margin:8px 0 0;border:1px solid #dfe3ec;';
        pre.textContent = JSON.stringify(data, null, 2);
        const existing = card.querySelector('pre');
        if (existing) existing.remove(); else card.appendChild(pre);
      };
      actions.appendChild(dbg);

      const rm = document.createElement('button');
      rm.className = 'btn-ghost';
      rm.textContent = 'Remove';
      rm.onclick = () => { videos.delete(v.taskId); saveStore(); render(); };
      actions.appendChild(rm);

      body.appendChild(actions);
      card.appendChild(body);
      grid.appendChild(card);
    }

    bulkBtn.disabled = succeeded === 0;
    bulkBtn.textContent = succeeded > 0 ? `Download all (${succeeded}) .zip` : 'Download all (.zip)';
  }

  bulkBtn.addEventListener('click', async () => {
    const ids = [...videos.values()].filter(v => v.status === 'SUCCEEDED').map(v => v.taskId);
    if (!ids.length) return;
    bulkBtn.disabled = true;
    const orig = bulkBtn.textContent;
    bulkBtn.textContent = 'Zipping…';
    try {
      const res = await fetch('/api/download-bulk', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ taskIds: ids }),
      });
      if (!res.ok) throw new Error('Bulk download failed.');
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `seedance-videos-${Date.now()}.zip`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    } catch (e) {
      alert(e.message);
    } finally {
      bulkBtn.disabled = false;
      bulkBtn.textContent = orig;
      render();
    }
  });

  clearBtn.addEventListener('click', () => {
    if (!videos.size) return;
    if (!confirm('Clear all videos from this view? (Generation history will be removed locally; videos remain on Runway.)')) return;
    videos.clear(); saveStore(); render();
  });

  loadStore();
  render();
  for (const v of videos.values()) {
    if (v.status !== 'SUCCEEDED' && v.status !== 'FAILED') pollTask(v.taskId);
  }
</script>
</body>
</html>
