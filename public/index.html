<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Seedance Video Studio</title>
<style>
  :root {
    --bg: #f6f7fb;
    --panel: #ffffff;
    --panel-2: #f1f3f9;
    --border: #dfe3ec;
    --text: #1a1f2c;
    --muted: #5b6478;
    --accent: #2563eb;
    --accent-2: #7c3aed;
    --ok: #047857;
    --err: #b91c1c;
    --warn: #b45309;
    --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header { padding: 18px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; background: var(--panel); }
  header h1 { margin: 0; font-size: 20px; font-weight: 600; flex: 1; }
  header .sub { color: var(--muted); font-size: 13px; }
  header .user { font-size: 12px; color: var(--muted); }
  main { max-width: 1280px; margin: 0 auto; padding: 24px 32px 80px; display: grid; grid-template-columns: 420px 1fr; gap: 24px; }
  @media (max-width: 1000px) { main { grid-template-columns: 1fr; } }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); }
  .panel h2 { margin: 0 0 14px; font-size: 14px; font-weight: 600; letter-spacing: 0.04em; color: var(--muted); text-transform: uppercase; }
  label { display: block; font-size: 13px; margin: 12px 0 6px; color: var(--muted); }
  input[type=file], input[type=text], input[type=password], textarea { width: 100%; background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; }
  textarea { resize: vertical; min-height: 200px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; line-height: 1.5; }
  .preview { margin-top: 10px; border: 1px dashed var(--border); border-radius: 8px; padding: 8px; min-height: 120px; display: flex; align-items: center; justify-content: center; background: var(--panel-2); }
  .preview img { max-width: 100%; max-height: 180px; border-radius: 6px; }
  .preview.empty { color: var(--muted); font-size: 13px; }

  button { cursor: pointer; border: 0; border-radius: 8px; padding: 10px 14px; font-size: 14px; font-weight: 600; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; width: 100%; padding: 12px; margin-top: 14px; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-danger { background: var(--err); color: white; }
  .btn-danger:disabled { opacity: 0.5; cursor: not-allowed; }

  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .toolbar .grow { flex: 1; }

  .chain-overview { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px; box-shadow: var(--shadow); margin-bottom: 16px; }
  .chain-overview .row { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .chain-overview .title { font-size: 15px; font-weight: 600; }
  .chain-overview .meta-line { color: var(--muted); font-size: 12px; margin-top: 6px; }
  .chain-overview .progress-track { height: 8px; background: rgba(15,23,42,0.08); border-radius: 999px; margin-top: 12px; overflow: hidden; }
  .chain-overview .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width 0.5s ease; border-radius: 999px; }
  .chain-overview .err { color: var(--err); font-size: 13px; margin-top: 8px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow); }
  .card video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }
  .card .placeholder { width: 100%; aspect-ratio: 16/9; background: var(--panel-2); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; flex-direction: column; gap: 10px; padding: 16px; text-align: center; border-bottom: 1px solid var(--border); }
  .card .placeholder .label { font-weight: 600; color: var(--text); font-size: 14px; }
  .card .body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
  .card .prompt { font-size: 13px; color: var(--text); line-height: 1.4; max-height: 4.2em; overflow: hidden; }
  .card .meta { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }
  .card .actions { display: flex; gap: 6px; }
  .card .actions button { flex: 1; padding: 7px 10px; font-size: 12px; }
  .clip-num { display: inline-block; background: var(--accent); color: white; font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; }

  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; margin-right: 6px; vertical-align: middle; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }

  .empty-state { color: var(--muted); padding: 60px 20px; text-align: center; border: 1px dashed var(--border); border-radius: 12px; }
  .err-msg { color: var(--err); font-size: 12px; margin-top: 8px; }
  small.hint { color: var(--muted); font-size: 11px; }

  .mode-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
  .mode-opt { display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: var(--panel-2); margin: 0; transition: border-color 0.15s, background 0.15s; }
  .mode-opt:has(input:checked) { border-color: var(--accent); background: rgba(37,99,235,0.06); }
  .mode-opt input { margin: 3px 0 0; width: auto; }
  .mode-opt span { display: flex; flex-direction: column; gap: 2px; }
  .mode-opt strong { font-size: 13px; color: var(--text); font-weight: 600; }
  .mode-opt small { font-size: 11px; color: var(--muted); line-height: 1.3; }
  .mode-pill { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--border); color: var(--muted); margin-left: 6px; vertical-align: middle; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
  .mode-pill.unlimited { background: rgba(37,99,235,0.08); border-color: rgba(37,99,235,0.35); color: var(--accent); }
  .mode-pill.credits { background: rgba(180,83,9,0.08); border-color: rgba(180,83,9,0.35); color: var(--warn); }

  /* Login overlay */
  #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  #loginOverlay.hidden { display: none; }
  .login-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 28px; box-shadow: var(--shadow); width: 100%; max-width: 380px; }
  .login-card h1 { margin: 0 0 4px; font-size: 22px; }
  .login-card .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
</style>
</head>
<body>

<div id="loginOverlay">
  <form class="login-card" id="loginForm">
    <h1>Seedance Video Studio</h1>
    <p class="sub">Sign in to continue.</p>
    <label for="loginUser">Username</label>
    <input id="loginUser" type="text" autocomplete="username" required />
    <label for="loginPass">Password</label>
    <input id="loginPass" type="password" autocomplete="current-password" required />
    <label style="display: flex; align-items: center; gap: 8px; margin-top: 14px; cursor: pointer; font-size: 13px; color: var(--text);">
      <input id="loginRemember" type="checkbox" style="width: auto; margin: 0;" />
      <span>Stay signed in until I sign out</span>
    </label>
    <button class="btn-primary" type="submit">Sign in</button>
    <div id="loginErr" class="err-msg" hidden></div>
  </form>
</div>

<header>
  <h1>Seedance Video Studio</h1>
  <span class="sub">Chain mode · 15s clips · 16:9 · sound</span>
  <span class="user" id="userLabel"></span>
  <button class="btn-ghost" id="logoutBtn">Sign out</button>
</header>

<main>
  <section class="panel">
    <h2>New Chain</h2>
    <form id="chainForm">
      <label for="image">Starting reference image</label>
      <input id="image" type="file" name="image" accept="image/*" required />
      <div id="preview" class="preview empty">No image selected</div>

      <label for="prompts">Prompts (one per line, in order)</label>
      <textarea id="prompts" name="prompts" placeholder="Wide shot of the town at sunrise...&#10;Camera slowly pushes in on the saloon...&#10;A train whistle echoes as steam fills the frame..." required></textarea>
      <small class="hint">Each line becomes a 15s clip. The last frame of clip N is used as the reference for clip N+1.</small>

      <label>Generation mode</label>
      <div class="mode-toggle">
        <label class="mode-opt">
          <input type="radio" name="mode" value="unlimited" checked />
          <span><strong>Unlimited</strong><small>No credits used. Requires Unlimited Runway plan.</small></span>
        </label>
        <label class="mode-opt">
          <input type="radio" name="mode" value="credits" />
          <span><strong>Credits</strong><small>Standard mode. Burns Runway credits per clip.</small></span>
        </label>
      </div>

      <button id="startBtn" class="btn-primary" type="submit">Start Chain</button>
      <div id="chainErr" class="err-msg" hidden></div>
    </form>
  </section>

  <section>
    <div id="chainOverview"></div>

    <div class="toolbar">
      <strong class="grow" id="clipsHeader">Clips</strong>
      <button id="bulkBtn" class="btn-secondary" disabled>Download all (.zip)</button>
    </div>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty-state">Start a chain on the left to begin generating clips.</div>
  </section>
</main>

<script>
  const STORE_KEY = 'seedance.chain.v2';
  const AUTH_KEY = 'seedance.auth';

  // ── Auth ─────────────────────────────────────────────────────────
  const loginOverlay = document.getElementById('loginOverlay');
  const loginForm = document.getElementById('loginForm');
  const loginUser = document.getElementById('loginUser');
  const loginPass = document.getElementById('loginPass');
  const loginErr = document.getElementById('loginErr');
  const userLabel = document.getElementById('userLabel');
  const logoutBtn = document.getElementById('logoutBtn');

  // Auth lives in localStorage (if "Stay signed in" was checked) or sessionStorage (default).
  // localStorage takes precedence on read so a remembered session survives tab closes.
  function getAuth() { return localStorage.getItem(AUTH_KEY) || sessionStorage.getItem(AUTH_KEY); }
  function setAuth(creds, remember) {
    if (remember) {
      localStorage.setItem(AUTH_KEY, creds);
      sessionStorage.removeItem(AUTH_KEY);
    } else {
      sessionStorage.setItem(AUTH_KEY, creds);
      localStorage.removeItem(AUTH_KEY);
    }
  }
  function clearAuth() {
    localStorage.removeItem(AUTH_KEY);
    sessionStorage.removeItem(AUTH_KEY);
  }
  function showLogin() { loginOverlay.classList.remove('hidden'); }
  function hideLogin() { loginOverlay.classList.add('hidden'); }

  async function authFetch(url, opts = {}) {
    const creds = getAuth();
    const headers = { ...(opts.headers || {}) };
    if (creds) headers.Authorization = 'Basic ' + creds;
    const res = await fetch(url, { ...opts, headers });
    if (res.status === 401) {
      clearAuth();
      showLogin();
      throw new Error('Not authenticated.');
    }
    return res;
  }

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginErr.hidden = true;
    const username = loginUser.value;
    const password = loginPass.value;
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(json.error || 'Login failed.');
      const remember = document.getElementById('loginRemember').checked;
      setAuth(btoa(`${username}:${password}`), remember);
      userLabel.textContent = username;
      hideLogin();
      loginPass.value = '';
      bootstrap();
    } catch (err) {
      loginErr.textContent = err.message;
      loginErr.hidden = false;
    }
  });

  logoutBtn.addEventListener('click', () => {
    clearAuth();
    location.reload();
  });

  // ── App state ────────────────────────────────────────────────────
  const form = document.getElementById('chainForm');
  const imageInput = document.getElementById('image');
  const promptsInput = document.getElementById('prompts');
  const preview = document.getElementById('preview');
  const startBtn = document.getElementById('startBtn');
  const chainErr = document.getElementById('chainErr');
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const bulkBtn = document.getElementById('bulkBtn');
  const overviewEl = document.getElementById('chainOverview');
  const clipsHeader = document.getElementById('clipsHeader');

  let activeChainId = localStorage.getItem(STORE_KEY) || null;
  let pollHandle = null;

  imageInput.addEventListener('change', () => {
    const file = imageInput.files?.[0];
    if (!file) { preview.className = 'preview empty'; preview.textContent = 'No image selected'; return; }
    const url = URL.createObjectURL(file);
    preview.className = 'preview';
    preview.innerHTML = '';
    const img = document.createElement('img'); img.src = url;
    preview.appendChild(img);
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    chainErr.hidden = true;
    const file = imageInput.files?.[0];
    const prompts = promptsInput.value.split('\n').map(s => s.trim()).filter(Boolean);
    if (!file) { chainErr.textContent = 'Image required.'; chainErr.hidden = false; return; }
    if (!prompts.length) { chainErr.textContent = 'At least one prompt required.'; chainErr.hidden = false; return; }

    startBtn.disabled = true;
    startBtn.textContent = 'Starting…';
    try {
      const mode = document.querySelector('input[name="mode"]:checked')?.value || 'unlimited';
      const fd = new FormData();
      fd.append('image', file);
      fd.append('prompts', JSON.stringify(prompts));
      fd.append('mode', mode);
      const res = await authFetch('/api/chain/start', { method: 'POST', body: fd });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || 'Failed to start chain.');
      activeChainId = json.chainId;
      localStorage.setItem(STORE_KEY, activeChainId);
      promptsInput.value = '';
      imageInput.value = '';
      preview.className = 'preview empty';
      preview.textContent = 'No image selected';
      poll();
    } catch (err) {
      chainErr.textContent = err.message;
      chainErr.hidden = false;
    } finally {
      startBtn.disabled = false;
      startBtn.textContent = 'Start Chain';
    }
  });

  async function poll() {
    if (!activeChainId) return;
    try {
      const res = await authFetch(`/api/chain/status?chainId=${activeChainId}`);
      if (res.status === 404) {
        // Chain expired (server restart)
        localStorage.removeItem(STORE_KEY);
        activeChainId = null;
        render(null);
        return;
      }
      const json = await res.json();
      render(json);
      const terminal = ['COMPLETED', 'FAILED', 'STOPPED'].includes(json.currentStatus);
      if (!terminal) {
        clearTimeout(pollHandle);
        pollHandle = setTimeout(poll, 30000);
      }
    } catch (e) {
      console.warn('[poll]', e);
      clearTimeout(pollHandle);
      pollHandle = setTimeout(poll, 30000);
    }
  }

  function statusLabel(s) {
    switch (s) {
      case 'STARTING': return 'Starting';
      case 'UPLOADING_REFERENCE': return 'Uploading reference frame';
      case 'CREATING_VIDEO': return 'Submitting to Seedance';
      case 'GENERATING': return 'Generating video';
      case 'DOWNLOADING': return 'Downloading clip';
      case 'EXTRACTING_FRAME': return 'Extracting last frame';
      case 'COMPLETED': return 'Completed';
      case 'STOPPED': return 'Stopped';
      case 'FAILED': return 'Failed';
      default: return s || 'Working';
    }
  }

  function fmtDuration(ms) {
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const r = s % 60;
    return h > 0 ? `${h}h ${m}m` : `${m}m ${r}s`;
  }

  function renderOverview(snap) {
    if (!snap) { overviewEl.innerHTML = ''; return; }
    const total = snap.totalPrompts;
    const done = snap.clips.length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    const isWorking = !['COMPLETED', 'FAILED', 'STOPPED'].includes(snap.currentStatus);
    const elapsed = Date.now() - snap.startedAt;
    const taskProgress = typeof snap.currentTaskProgress === 'string' ? parseFloat(snap.currentTaskProgress) : snap.currentTaskProgress;
    const taskPctText = (typeof taskProgress === 'number' && !isNaN(taskProgress) && taskProgress > 0) ? ` · ${Math.round(taskProgress * 100)}%` : '';
    const clipElapsed = snap.currentClipStartedAt ? fmtDuration(Date.now() - snap.currentClipStartedAt) : '';

    overviewEl.innerHTML = '';
    const root = document.createElement('div');
    root.className = 'chain-overview';

    const row = document.createElement('div');
    row.className = 'row';
    const left = document.createElement('div');
    const title = document.createElement('div');
    title.className = 'title';
    if (isWorking) {
      const dot = document.createElement('span'); dot.className = 'pulse-dot'; title.appendChild(dot);
    }
    title.appendChild(document.createTextNode(`${statusLabel(snap.currentStatus)} — clip ${Math.min(snap.currentIndex + 1, total)} of ${total}`));
    if (snap.mode) {
      const pill = document.createElement('span');
      pill.className = `mode-pill ${snap.mode}`;
      pill.textContent = snap.mode;
      title.appendChild(pill);
    }
    left.appendChild(title);

    const meta = document.createElement('div');
    meta.className = 'meta-line';
    let metaText = `${done}/${total} clips done · Elapsed ${fmtDuration(elapsed)}`;
    if (isWorking && snap.currentTaskStatus) {
      metaText += ` · Task: ${snap.currentTaskStatus}${taskPctText}`;
      if (clipElapsed) metaText += ` · This clip: ${clipElapsed}`;
      if (snap.currentPollCount) metaText += ` · ${snap.currentPollCount} polls`;
    }
    meta.textContent = metaText;
    left.appendChild(meta);

    if (snap.error) {
      const e = document.createElement('div'); e.className = 'err'; e.textContent = 'Error: ' + snap.error;
      left.appendChild(e);
    }
    row.appendChild(left);

    const actions = document.createElement('div');
    actions.style.display = 'flex'; actions.style.gap = '8px';
    if (isWorking) {
      const stop = document.createElement('button');
      stop.className = 'btn-danger';
      stop.textContent = 'Stop';
      stop.onclick = async () => {
        if (!confirm('Stop this chain? In-flight clip will finish, then the chain stops.')) return;
        stop.disabled = true;
        try {
          await authFetch('/api/chain/stop', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chainId: snap.id }),
          });
          poll();
        } catch (e) { alert(e.message); stop.disabled = false; }
      };
      actions.appendChild(stop);
    } else {
      const newOne = document.createElement('button');
      newOne.className = 'btn-ghost';
      newOne.textContent = 'Clear';
      newOne.onclick = async () => {
        if (!confirm('Clear this chain from the view? Server-side memory is freed.')) return;
        try { await authFetch(`/api/chain?chainId=${snap.id}`, { method: 'DELETE' }); } catch {}
        localStorage.removeItem(STORE_KEY);
        activeChainId = null;
        render(null);
      };
      actions.appendChild(newOne);
    }
    row.appendChild(actions);
    root.appendChild(row);

    const track = document.createElement('div'); track.className = 'progress-track';
    const fill = document.createElement('div'); fill.className = 'progress-fill';
    fill.style.width = pct + '%';
    track.appendChild(fill);
    root.appendChild(track);

    overviewEl.appendChild(root);
  }

  function renderGrid(snap) {
    grid.innerHTML = '';
    if (!snap) { empty.style.display = 'block'; clipsHeader.textContent = 'Clips'; bulkBtn.disabled = true; return; }
    const total = snap.totalPrompts;
    const clips = snap.clips;
    empty.style.display = (total === 0) ? 'block' : 'none';
    clipsHeader.textContent = `Clips (${clips.length} / ${total})`;
    bulkBtn.disabled = clips.length === 0;

    // One card per prompt — completed clips show video, in-flight shows status, queued shows pending
    for (let i = 0; i < total; i++) {
      const clip = clips.find(c => c.index === i);
      const card = document.createElement('div'); card.className = 'card';

      let media;
      if (clip) {
        media = document.createElement('video');
        media.controls = true;
        media.preload = 'metadata';
        media.src = `/api/chain/clip?chainId=${snap.id}&index=${i}&_=${getAuthQs()}`;
        // browsers don't send Authorization on <video src>; we use a query-token workaround below
      } else {
        media = document.createElement('div');
        media.className = 'placeholder';
        const lbl = document.createElement('div'); lbl.className = 'label';
        if (i === snap.currentIndex && !['COMPLETED','STOPPED','FAILED'].includes(snap.currentStatus)) {
          const dot = document.createElement('span'); dot.className = 'pulse-dot'; lbl.appendChild(dot);
          lbl.appendChild(document.createTextNode(statusLabel(snap.currentStatus)));
        } else if (snap.currentStatus === 'STOPPED' || snap.currentStatus === 'FAILED') {
          lbl.textContent = 'Not generated';
        } else {
          lbl.textContent = `Queued (${i + 1} of ${total})`;
        }
        media.appendChild(lbl);
      }
      card.appendChild(media);

      const body = document.createElement('div'); body.className = 'body';
      const num = document.createElement('span'); num.className = 'clip-num'; num.textContent = `#${i + 1}`;
      const promptEl = document.createElement('div'); promptEl.className = 'prompt';
      promptEl.textContent = clip?.prompt || (snap.prompts && snap.prompts[i]) || '';

      const meta = document.createElement('div'); meta.className = 'meta';
      meta.appendChild(num);
      const right = document.createElement('span');
      right.textContent = clip ? `${(clip.sizeBytes / (1024*1024)).toFixed(1)} MB` : '';
      meta.appendChild(right);

      body.appendChild(promptEl);
      body.appendChild(meta);

      if (clip) {
        const actions = document.createElement('div'); actions.className = 'actions';
        const dl = document.createElement('button');
        dl.className = 'btn-secondary'; dl.textContent = 'Download';
        dl.onclick = async () => {
          // Download via authFetch → blob → object URL (preserves auth)
          dl.disabled = true; dl.textContent = 'Downloading…';
          try {
            const r = await authFetch(`/api/chain/clip?chainId=${snap.id}&index=${i}`);
            if (!r.ok) throw new Error('Download failed');
            const blob = await r.blob();
            const u = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = u; a.download = `clip-${String(i + 1).padStart(2, '0')}.mp4`;
            document.body.appendChild(a); a.click(); a.remove();
            URL.revokeObjectURL(u);
          } catch (e) { alert(e.message); }
          finally { dl.disabled = false; dl.textContent = 'Download'; }
        };
        actions.appendChild(dl);
        body.appendChild(actions);
      }

      card.appendChild(body);
      grid.appendChild(card);
    }
  }

  // Inline video src can't carry Authorization headers. Two options:
  //  (a) Make video bytes public for the chain id (insecure)
  //  (b) Stream via a blob URL (works, but loads the whole clip into memory at once)
  // We use (b) for inline preview by replacing video.src with a blob URL once metadata is requested.
  function getAuthQs() { return ''; } // placeholder so existing src= attribute still resolves with auth via fetchVideoBlob below

  async function loadInlineBlobs() {
    // For each card with a video element whose src points at /api/chain/clip and not yet a blob:
    document.querySelectorAll('video').forEach(async (v) => {
      const m = v.src.match(/\/api\/chain\/clip\?chainId=([^&]+)&index=(\d+)/);
      if (!m) return;
      if (v.dataset.loaded === '1') return;
      v.dataset.loaded = '1';
      try {
        const r = await authFetch(`/api/chain/clip?chainId=${m[1]}&index=${m[2]}`);
        if (!r.ok) return;
        const blob = await r.blob();
        v.src = URL.createObjectURL(blob);
      } catch (e) { console.warn('inline blob load', e); }
    });
  }

  let _lastSnap = null;
  function render(snap) {
    _lastSnap = snap;
    renderOverview(snap);
    renderGrid(snap);
    loadInlineBlobs();
  }

  bulkBtn.addEventListener('click', async () => {
    if (!activeChainId) return;
    bulkBtn.disabled = true;
    const orig = bulkBtn.textContent;
    bulkBtn.textContent = 'Zipping…';
    try {
      const r = await authFetch(`/api/chain/zip?chainId=${activeChainId}`);
      if (!r.ok) throw new Error('Zip failed');
      const blob = await r.blob();
      const u = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = u; a.download = `chain-${activeChainId}.zip`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(u);
    } catch (e) { alert(e.message); }
    finally { bulkBtn.disabled = false; bulkBtn.textContent = orig; }
  });

  // Live tick for elapsed timers (re-renders overview from the last snapshot once a second)
  setInterval(() => { if (_lastSnap) renderOverview(_lastSnap); }, 1000);

  // ── Bootstrap ────────────────────────────────────────────────────
  function bootstrap() {
    if (activeChainId) poll();
    else render(null);
  }

  if (getAuth()) {
    hideLogin();
    bootstrap();
  } else {
    showLogin();
  }
</script>
</body>
</html>
